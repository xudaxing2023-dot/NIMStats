name: Benchmark NVIDIA NIM Models

on:
  schedule:
    - cron: '*/20 * * * *'  # Run every 20 minutes
  workflow_dispatch:

jobs:
  test_group1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Test model group 1 (DeepSeek, GLM, MiniMax, Nemotron, Kimi)
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: group1
        run: python3 scripts/test_models.py
      
      - name: Upload group1 results
        uses: actions/upload-artifact@v7
        with:
          name: results-group1
          path: scripts/results.json
          retention-days: 1

  test_group2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Test model group 2 (GPT-OSS, Gemma, Qwen, Mistral, Llama)
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: group2
        run: python3 scripts/test_models.py
      
      - name: Upload group2 results
        uses: actions/upload-artifact@v7
        with:
          name: results-group2
          path: scripts/results.json
          retention-days: 1

  merge_and_update:
    needs: [test_group1, test_group2]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          path: scripts/
      
      - name: Merge results and update history
        run: |
          mv scripts/results-group1/results.json scripts/results-group1.json || true
          mv scripts/results-group2/results.json scripts/results-group2.json || true
          python3 scripts/merge_results.py
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.db
          if ! git diff --cached --quiet; then
            git commit -m "Update benchmark results"
            git push
          else
            echo "No history updates to commit"
          fi
