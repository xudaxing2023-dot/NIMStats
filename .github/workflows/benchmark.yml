name: Benchmark NVIDIA NIM Models

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:     # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run benchmarks
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          chmod +x scripts/test-models.sh
          cd scripts && bash test-models.sh

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json results.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update benchmark results" && git push)
